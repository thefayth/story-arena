<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Story Arena public private boundary</title>
  <desc id="desc">Diagram showing private scripts, prompts, and admin systems passing through sanitization and owner approval before public summaries, title pages, awards, and GitHub surface.</desc>
  <rect width="1400" height="760" fill="#fff8e8"/>
  <text x="70" y="86" font-family="Arial Black, Arial, sans-serif" font-size="40" fill="#141210">Public / Private Boundary</text>
  <text x="72" y="124" font-family="Arial, sans-serif" font-size="20" fill="#5c4b96">Only approved, sanitized metadata leaves the vault.</text>
  <rect x="70" y="180" width="360" height="470" fill="#141210" stroke="#d6a334" stroke-width="5"/>
  <text x="250" y="232" font-family="Arial Black, Arial, sans-serif" font-size="28" fill="#fffdf4" text-anchor="middle">PRIVATE</text>
  <g font-family="Arial, sans-serif" font-size="20" fill="#fffdf4" text-anchor="middle">
    <rect x="115" y="280" width="270" height="64" fill="#5c4b96" stroke="#fffdf4" stroke-width="2"/>
    <text x="250" y="320">Full scripts and uploads</text>
    <rect x="115" y="380" width="270" height="64" fill="#ab4858" stroke="#fffdf4" stroke-width="2"/>
    <text x="250" y="420">Private prompts</text>
    <rect x="115" y="480" width="270" height="64" fill="#2a8784" stroke="#fffdf4" stroke-width="2"/>
    <text x="250" y="520">Admin and deploy systems</text>
  </g>
  <rect x="520" y="220" width="320" height="390" fill="#fffdf4" stroke="#141210" stroke-width="4"/>
  <text x="680" y="272" font-family="Arial Black, Arial, sans-serif" font-size="28" fill="#141210" text-anchor="middle">REVIEW</text>
  <rect x="565" y="330" width="230" height="70" fill="#fad668" stroke="#141210" stroke-width="3"/>
  <text x="680" y="372" font-family="Arial, sans-serif" font-size="20" fill="#141210" text-anchor="middle">Sanitization layer</text>
  <rect x="565" y="455" width="230" height="70" fill="#d6a334" stroke="#141210" stroke-width="3"/>
  <text x="680" y="497" font-family="Arial, sans-serif" font-size="20" fill="#141210" text-anchor="middle">Owner approval</text>
  <rect x="930" y="180" width="390" height="470" fill="#fffdf4" stroke="#141210" stroke-width="4"/>
  <text x="1125" y="232" font-family="Arial Black, Arial, sans-serif" font-size="28" fill="#141210" text-anchor="middle">PUBLIC</text>
  <g font-family="Arial, sans-serif" font-size="20" fill="#141210" text-anchor="middle">
    <rect x="985" y="280" width="280" height="64" fill="#fad668" stroke="#141210" stroke-width="3"/>
    <text x="1125" y="320">Approved summaries</text>
    <rect x="985" y="380" width="280" height="64" fill="#fff8e8" stroke="#141210" stroke-width="3"/>
    <text x="1125" y="420">Title pages</text>
    <rect x="985" y="480" width="280" height="64" fill="#d6a334" stroke="#141210" stroke-width="3"/>
    <text x="1125" y="520">Awards and GitHub surface</text>
  </g>
  <g stroke="#141210" stroke-width="5" fill="none" marker-end="url(#arrow)">
    <path d="M430 414 H520"/>
    <path d="M840 414 H930"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#141210"/>
    </marker>
  </defs>
</svg>
